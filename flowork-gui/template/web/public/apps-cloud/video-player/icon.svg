<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f3ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc13fe;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#neonGrad)" stroke-width="1.5" opacity="0.7" />

  <path d="M32,2 A30,30 0 0,1 62,32" fill="none" stroke="#00f3ff" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <path d="M2,32 A30,30 0 0,1 32,62" fill="none" stroke="#bc13fe" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <g filter="url(#glow)">
      <path d="M32 10 L52 20 L52 44 L32 54 L12 44 L12 20 Z" fill="#030508" stroke="url(#neonGrad)" stroke-width="1"/>
      <path d="M28,22 L42,32 L28,42 Z" fill="url(#neonGrad)"/>
  </g>
</svg>