<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f5ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="20" fill="#0d0d12" />

  <path d="M20 50 Q30 30 40 50 T60 50 T80 50" stroke="#333" stroke-width="2" fill="none" opacity="0.5" />

  <g filter="url(#neonGlow)">
    <path d="M35 70 V25 L75 15 V60" stroke="url(#cyberGrad)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="28" cy="70" r="8" fill="url(#cyberGrad)" />
    <circle cx="68" cy="60" r="8" fill="url(#cyberGrad)" />
    <path d="M35 35 L75 25" stroke="url(#cyberGrad)" stroke-width="4" stroke-linecap="round" />
  </g>

  <circle cx="85" cy="85" r="2" fill="#00f5ff" />
  <circle cx="15" cy="15" r="2" fill="#ff00ff" />
</svg>