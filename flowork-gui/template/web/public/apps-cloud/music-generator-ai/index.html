<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #030305;
            --card: rgba(20, 20, 35, 0.8);
            --accent: #00f5ff;
            --purple: #bc13fe;
            --pink: #ff00ff;
            --yellow: #facc15;
            --text: #e2e8f0;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 20px;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 10% 10%, rgba(188, 19, 254, 0.15), transparent),
                radial-gradient(circle at 90% 90%, rgba(0, 245, 255, 0.15), transparent),
                radial-gradient(circle at 50% -20%, #1e1b4b, transparent);
            color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
        }

        .wave-container { display: flex; align-items: flex-end; gap: 3px; height: 20px; margin-left: 15px; }
        .wave-bar { width: 3px; height: 5px; background: var(--accent); animation: pulse-wave 1.2s infinite ease-in-out; border-radius: 10px; }
        .wave-bar:nth-child(2) { animation-delay: 0.1s; background: var(--purple); }
        .wave-bar:nth-child(3) { animation-delay: 0.2s; background: var(--pink); }
        .wave-bar:nth-child(4) { animation-delay: 0.3s; background: var(--yellow); }
        @keyframes pulse-wave { 0%, 100% { height: 5px; } 50% { height: 20px; } }

        h1 {
            font-family: 'Orbitron'; font-size: 1.4rem; color: #fff; margin: 0;
            letter-spacing: 4px; font-weight: 900;
            background: linear-gradient(to right, var(--accent), var(--purple), var(--pink));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 245, 255, 0.3));
        }

        .studio-container { display: grid; grid-template-columns: 1fr 340px; gap: 20px; flex-grow: 1; min-height: 0; margin-top: 15px; }

        .glass-panel {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .section-label {
            font-size: 0.65rem; font-weight: 800; color: #94a3b8;
            text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
        }

        .toggle-group { display: flex; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 15px; margin-bottom: 20px; border: 1px solid var(--border); }
        .toggle-btn {
            flex: 1; padding: 10px; border-radius: 10px; border: none; background: transparent;
            color: #64748b; font-size: 0.75rem; font-weight: 700; font-family: 'Orbitron';
            cursor: pointer; transition: 0.4s;
        }
        .toggle-btn.active { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(0, 245, 255, 0.4); }

        textarea, input, select {
            width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);
            color: #fff; border-radius: 14px; padding: 14px; font-size: 0.85rem;
            transition: all 0.3s;
            appearance: none; -webkit-appearance: none;
        }
        textarea:focus, input:focus { border-color: var(--accent); outline: none; background: rgba(0,0,0,0.6); border-width: 2px; }

        input[type="checkbox"] {
            appearance: auto !important; -webkit-appearance: auto !important;
            width: 18px !important; height: 18px !important;
            padding: 0 !important; margin-right: 8px !important;
            background: transparent !important; border: none !important;
            accent-color: var(--accent); cursor: pointer; vertical-align: middle;
        }

        .neural-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .param-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.03); }

        .btn-generate {
            width: 100%; padding: 18px; border-radius: 16px; border: none;
            background: linear-gradient(45deg, var(--accent), var(--purple));
            color: #000; font-family: 'Orbitron'; font-weight: 900; font-size: 0.85rem;
            cursor: pointer; transition: 0.4s; display: flex; align-items: center; justify-content: center; gap: 12px;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-generate:hover { transform: scale(1.02); filter: brightness(1.2); }

        .track-item {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
            padding: 16px; border-radius: 18px; margin-bottom: 12px;
            border-left: 4px solid var(--accent);
            animation: slideIn 0.3s ease-out;
            transition: 0.3s;
        }
        .track-item.done { border-left-color: #4ade80; background: rgba(74, 222, 128, 0.05); }
        .track-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

        .btn-download {
            display: inline-flex; align-items: center; gap: 8px;
            background: #fff; color: #000; padding: 6px 12px; border-radius: 8px;
            font-size: 0.65rem; font-weight: 800; text-decoration: none; margin-top: 10px;
            margin-right: 5px; cursor: pointer; border: none;
            transition: 0.3s; font-family: 'Inter', sans-serif;
        }
        .btn-download:hover { background: var(--accent); transform: translateY(-2px); }
        .btn-download:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* [NEW] Resync Button Style */
        .btn-resync {
            background: transparent; color: var(--accent); border: 1px solid var(--accent);
            padding: 6px 10px; border-radius: 8px; font-size: 0.6rem; font-weight: 800;
            cursor: pointer; margin-top: 10px; display: inline-flex; align-items: center; gap: 6px;
            transition: 0.3s;
        }
        .btn-resync:hover { background: rgba(0,245,255,0.1); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 245, 255, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(0, 245, 255, 0); } 100% { opacity: 1; } }

        .hidden { display: none; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        input[type="range"] {
            appearance: none; -webkit-appearance: none;
            height: 3px; background: #334155; border-radius: 5px; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            appearance: none; -webkit-appearance: none;
            width: 14px; height: 14px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent);
        }
    </style>
</head>
<body>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
        <div style="display: flex; align-items: center;">
            <h1>MUSIC GENERATOR AI</h1>
            <div class="wave-container">
                <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
            </div>
        </div>
        <div style="font-size: 0.65rem; color: #4ade80; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.3); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(74, 222, 128, 0.2);">
            <i data-lucide="zap" style="width:14px; height:14px;"></i> ENGINE SECURE
        </div>
    </div>
    <div style="font-size: 0.6rem; color: var(--accent); letter-spacing: 3px; font-weight: 800; margin-bottom: 15px;">NEURAL CORE v2.0 PRIVATE STUDIO</div>

    <div class="studio-container">
        <div class="glass-panel">
            <div class="toggle-group">
                <button id="modeS" class="toggle-btn active" onclick="updateMode('simple')">QUICK GEN</button>
                <button id="modeC" class="toggle-btn" onclick="updateMode('custom')">STUDIO MODE</button>
            </div>

            <div id="panelSimple">
                <span class="section-label"><i data-lucide="sparkles" style="width:12px"></i> AI Prompt Engine</span>
                <textarea id="promptS" rows="4" placeholder="Describe the vibe (e.g. 'Cheerful tropical house with melodic flute')..."></textarea>
            </div>

            <div id="panelCustom" class="hidden">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px">
                    <div>
                        <span class="section-label"><i data-lucide="file-text" style="width:12px"></i> Title</span>
                        <input type="text" id="title" placeholder="Untitled Neural">
                    </div>
                    <div>
                        <span class="section-label"><i data-lucide="music" style="width:12px"></i> Style Tags</span>
                        <input type="text" id="style" placeholder="Happy, Uplifting...">
                    </div>
                </div>
                <div style="margin-bottom:15px">
                    <span class="section-label"><i data-lucide="list-music" style="width:12px"></i> Sequence / Lyrics</span>
                    <textarea id="promptC" rows="4" class="mono" placeholder="[Intro]\n(Lyrics here)..."></textarea>
                </div>
            </div>

            <div style="margin-bottom:20px">
                <span class="section-label"><i data-lucide="shield-off" style="width:12px"></i> Anomaly Exclusion</span>
                <input type="text" id="negTags" placeholder="Sad, Slow, Dark Vibes...">
            </div>

            <span class="section-label"><i data-lucide="mic-2" style="width:12px"></i> Vocal Profile</span>
            <div class="toggle-group" style="margin-bottom: 20px;">
                <button id="voxM" class="toggle-btn active" onclick="setVox('m')">ALPHA (MALE)</button>
                <button id="voxF" class="toggle-btn" onclick="setVox('f')">BETA (FEMALE)</button>
            </div>

            <div class="neural-controls">
                <div class="param-box">
                    <div style="display:flex; justify-content:space-between; font-size:0.65rem; margin-bottom:8px"><span>DNA WEIGHT</span><span id="txtStyle" style="color:var(--accent)">0.65</span></div>
                    <input type="range" id="valStyle" min="0" max="1" step="0.01" value="0.65" oninput="document.getElementById('txtStyle').innerText=this.value">
                </div>
                <div class="param-box">
                    <div style="display:flex; justify-content:space-between; font-size:0.65rem; margin-bottom:8px"><span>ANOMALY</span><span id="txtWeird" style="color:var(--accent)">0.65</span></div>
                    <input type="range" id="valWeird" min="0" max="1" step="0.01" value="0.65" oninput="document.getElementById('txtWeird').innerText=this.value">
                </div>
            </div>

            <button id="btnGen" class="btn-generate" onclick="executeGeneration()">
                <i data-lucide="cpu" style="width:18px"></i> INITIALIZE NEURAL CORE
            </button>
        </div>

        <div class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span class="section-label" style="margin-bottom:0">Pipeline Results</span>
                <button onclick="clearHistory()" style="background:transparent; border:none; color:#f87171; font-size:0.6rem; cursor:pointer; font-weight:bold;">CLEAR HISTORY</button>
            </div>

            <div id="trackList" style="flex-grow: 1; overflow-y: auto;">
                </div>

            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border);">
                <span class="section-label">Config</span>
                <select id="model_sel" style="margin-bottom:10px; font-size:0.7rem;">
                    <option value="V5">FLOW v2.0</option>
                    <option value="V4">FLOW v1.0</option>
                    <option value="V45ALL">FLOW v1.5</option>
                </select>
                <div style="display:flex; align-items:center; gap:10px; font-size: 0.65rem;">
                    <input type="checkbox" id="chkInstr" style="width:auto;"> INSTRUMENTAL MODE
                </div>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'flowork_neural_history_v4';
        let currentMode = 'simple';
        let currentVox = 'm';

        window.onload = () => {
            lucide.createIcons();
            restoreHistory();
            startStatusPolling();
        };

        window.updateMode = (mode) => {
            currentMode = mode;
            document.getElementById('modeS').classList.toggle('active', mode === 'simple');
            document.getElementById('modeC').classList.toggle('active', mode === 'custom');
            document.getElementById('panelSimple').classList.toggle('hidden', mode === 'custom');
            document.getElementById('panelCustom').classList.toggle('hidden', mode === 'simple');
        };

        window.setVox = (v) => {
            currentVox = v;
            document.getElementById('voxM').classList.toggle('active', v === 'm');
            document.getElementById('voxF').classList.toggle('active', v === 'f');
        };

        // [SECURITY] Client-side Validation Constraints
        function validateConstraints(model, title, style, prompt) {
            const limits = {
                'V5': { style: 1000, title: 100, prompt: 5000 },
                'V4_5PLUS': { style: 1000, title: 100, prompt: 5000 },
                'V4_5': { style: 1000, title: 100, prompt: 5000 },
                'V45ALL': { style: 1000, title: 80, prompt: 5000 },
                'V4': { style: 200, title: 80, prompt: 3000 }
            };
            const def = limits['V5'];
            const limit = limits[model] || def;

            if (title.length > limit.title) throw new Error(`Title exceeds limit for ${model} (Max: ${limit.title})`);
            if (style.length > limit.style) throw new Error(`Style exceeds limit for ${model} (Max: ${limit.style})`);
            if (prompt.length > limit.prompt) throw new Error(`Prompt exceeds limit for ${model} (Max: ${limit.prompt})`);
        }

        async function forceDownload(url, filename) {
            const btn = event.target.closest('button');
            const originalHtml = btn.innerHTML;

            try {
                btn.disabled = true;
                btn.innerHTML = '<div class="status-dot"></div> GETTING...';

                const response = await fetch(url);
                if (!response.ok) throw new Error("Network Fetch Error");

                const blob = await response.blob();
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(link.href);
            } catch (error) {
                console.warn("Direct download blocked, fallback to new tab:", error);
                window.open(url, '_blank');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalHtml;
                lucide.createIcons();
            }
        }

        // [NEW FEATURE] Manual Sync to fetch missing tracks
        async function forceSync(taskId) {
            const btn = document.getElementById(`sync-${taskId}`);
            if(btn) { btn.disabled = true; btn.querySelector('i').classList.add('spin'); }

            const user = JSON.parse(localStorage.getItem('flowork_user_identity'))?.id || '';
            try {
                 const res = await fetch('/api/v1/ai/music', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-User-Address': user },
                    body: JSON.stringify({ action: 'check_status', taskId: taskId, user_address: user })
                });
                const data = await res.json();

                let foundUrls = [];
                const safePush = (arr) => {
                     if(Array.isArray(arr)) {
                         arr.forEach(item => {
                             if(item.audio_url) foundUrls.push(item.audio_url);
                             else if(item.audioUrl) foundUrls.push(item.audioUrl);
                             else if(item.url) foundUrls.push(item.url);
                         });
                     }
                };

                if (data.data?.response?.sunoData) safePush(data.data.response.sunoData);
                else if (Array.isArray(data.data)) safePush(data.data);
                else if (data.data?.data && Array.isArray(data.data.data)) safePush(data.data.data);
                else {
                    if (data.data?.audio_url) foundUrls.push(data.data.audio_url);
                    else if (data.data?.audioUrl) foundUrls.push(data.data.audioUrl);
                }

                if(foundUrls.length > 0) {
                    let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                    const trackIdx = history.findIndex(t => t.taskId === taskId);
                    if(trackIdx !== -1) {
                        history[trackIdx].audioUrls = foundUrls;
                        history[trackIdx].audioUrl = foundUrls[0];
                        history[trackIdx].status = 'COMPLETED';
                        saveToLocalStorage(history);
                        restoreHistory();
                    }
                }
            } catch(e) {
                console.error("Sync failed", e);
            } finally {
                 if(btn) { btn.disabled = false; btn.querySelector('i').classList.remove('spin'); }
            }
        }

        function saveTrackToHistory(track) {
            let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            history.unshift(track);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(history.slice(0, 50)));
        }

        function restoreHistory() {
            const list = document.getElementById('trackList');
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
            list.innerHTML = '';
            history.forEach(track => {
                addTrackToUI(track);
            });
        }

        function clearHistory() {
            if(confirm("Purge Neural History?")) {
                localStorage.removeItem(STORAGE_KEY);
                restoreHistory();
            }
        }

        // [LOGIC UPDATE] Polling Logic with safePush for multiple audio detection
        async function startStatusPolling() {
            setInterval(async () => {
                let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                const pending = history.filter(t => t.status !== 'COMPLETED' && t.status !== 'FAILED');
                const user = JSON.parse(localStorage.getItem('flowork_user_identity'))?.id || '';

                if (pending.length === 0) return;

                for(let track of pending) {
                    try {
                        const res = await fetch('/api/v1/ai/music', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'X-User-Address': user },
                            body: JSON.stringify({ action: 'check_status', taskId: track.taskId, user_address: user })
                        });
                        const data = await res.json();

                        let foundUrls = [];

                        // [GENIUS MOVE] The Array Parser Logic
                        const safePush = (arr) => {
                             if(Array.isArray(arr)) {
                                 arr.forEach(item => {
                                     // Check ALL possible keys
                                     if(item.audio_url) foundUrls.push(item.audio_url);
                                     else if(item.audioUrl) foundUrls.push(item.audioUrl);
                                     else if(item.url) foundUrls.push(item.url);
                                 });
                             }
                        };

                        // 1. Priority: sunoData (Standard KIE)
                        if (data.data?.response?.sunoData) safePush(data.data.response.sunoData);
                        // 2. Direct Array
                        else if (Array.isArray(data.data)) safePush(data.data);
                        // 3. Deep Nested Array
                        else if (data.data?.data && Array.isArray(data.data.data)) safePush(data.data.data);
                        // 4. Single Object Fallback
                        else {
                             if (data.data?.audio_url) foundUrls.push(data.data.audio_url);
                             else if (data.data?.audioUrl) foundUrls.push(data.data.audioUrl);
                             else if (data.audio_url) foundUrls.push(data.audio_url);
                         }

                        const rawStatus = data.status || data.data?.status || '';

                        // Jika URL ketemu (length > 0), anggap COMPLETED
                        if(foundUrls.length > 0) {
                            track.status = 'COMPLETED';
                            track.audioUrls = foundUrls; // Save array!
                            track.audioUrl = foundUrls[0]; // Fallback single
                            saveToLocalStorage(history);
                            restoreHistory();
                        } else if (['FAILED', 'ERROR', 'failed'].includes(rawStatus)) {
                            track.status = 'FAILED';
                            saveToLocalStorage(history);
                            restoreHistory();
                        }

                    } catch(e) { console.warn("Polling fail:", e); }
                }
            }, 8000);
        }

        function saveToLocalStorage(history) {
             localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
        }

        window.executeGeneration = async () => {
            const btn = document.getElementById('btnGen');
            const user_address = JSON.parse(localStorage.getItem('flowork_user_identity'))?.id || '';

            // Inputs
            const selectedModel = document.getElementById('model_sel').value;
            const titleInput = currentMode === 'custom' ? document.getElementById('title').value : "Neural Stream";
            const styleInput = currentMode === 'custom' ? document.getElementById('style').value : "";
            const promptInput = currentMode === 'custom' ? document.getElementById('promptC').value : document.getElementById('promptS').value;

            // [SECURITY] Pre-flight Validation
            try {
                if(!promptInput) throw new Error("System requires prompt input.");
                validateConstraints(selectedModel, titleInput, styleInput, promptInput);

                const payload = {
                    type: 'audio', user_address,
                    customMode: currentMode === 'custom',
                    instrumental: document.getElementById('chkInstr').checked,
                    model: selectedModel,
                    prompt: promptInput,
                    title: titleInput,
                    style: styleInput,
                    negativeTags: document.getElementById('negTags').value,
                    vocalGender: currentVox,
                    styleWeight: parseFloat(document.getElementById('valStyle').value),
                    weirdnessConstraint: parseFloat(document.getElementById('valWeird').value),
                    audioWeight: 0.65
                };

                btn.disabled = true;
                btn.innerHTML = '<div class="status-dot"></div> TRANSMITTING...';

                const res = await fetch('/api/v1/ai/music', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-User-Address': user_address },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if(!res.ok || data.error) throw new Error(data.error || "Bridge Error");

                const newTrack = {
                    title: payload.title,
                    taskId: data.data.taskId,
                    status: 'QUEUED',
                    audioUrl: null,
                    audioUrls: [],
                    timestamp: Date.now()
                };
                saveTrackToHistory(newTrack);
                restoreHistory();

            } catch(e) { alert(`⚠️ ${e.message}`); }
            finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="cpu" style="width:18px"></i> INITIALIZE NEURAL CORE';
                lucide.createIcons();
            }
        };

        function addTrackToUI(track) {
            const list = document.getElementById('trackList');
            const isDone = track.status === 'COMPLETED';
            const isFailed = track.status === 'FAILED';
            const div = document.createElement('div');
            div.className = `track-item ${isDone ? 'done' : ''}`;

            if (isFailed) div.style.borderLeftColor = '#ef4444';

            let downloadButtonsHtml = '';
            if (isDone) {
                // [LOGIC UPDATE] Render Multiple Buttons if Array exists
                if (track.audioUrls && track.audioUrls.length > 0) {
                    track.audioUrls.forEach((url, index) => {
                        const fname = `${track.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}_var${index+1}.mp3`;
                        downloadButtonsHtml += `
                            <button onclick="forceDownload('${url}', '${fname}')" class="btn-download">
                                <i data-lucide="download" style="width:12px"></i> VAR ${index + 1}
                            </button>`;
                    });
                }
                // Fallback for single legacy tracks
                else if (track.audioUrl) {
                    const fname = `${track.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.mp3`;
                    downloadButtonsHtml += `
                        <button onclick="forceDownload('${track.audioUrl}', '${fname}')" class="btn-download">
                            <i data-lucide="download" style="width:12px"></i> DOWNLOAD WAV
                        </button>`;
                }
            }

            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:start;">
                    <div style="font-size:0.75rem; font-weight:700; color:#fff;">${track.title}</div>
                    <div class="${(isDone || isFailed) ? '' : 'status-dot'}" style="${isFailed ? 'background:#ef4444;' : ''}"></div>
                </div>
                <div style="font-size:0.55rem; color:var(--accent); font-family:'JetBrains Mono'; margin-top:5px;">
                    ID: ${track.taskId ? track.taskId.substring(0,12) : '???'}...
                </div>
                <div style="font-size:0.55rem; color:#64748b; margin-top:2px;">STATUS: <span style="color:${isDone ? '#4ade80' : (isFailed ? '#ef4444' : '#fff')}">${track.status}</span></div>
                ${isDone ? `
                    <div style="margin-top:5px; display:flex; flex-wrap:wrap; align-items:center; gap:5px;">
                        ${downloadButtonsHtml}
                        <button id="sync-${track.taskId}" onclick="forceSync('${track.taskId}')" class="btn-resync" title="Force check for more variations">
                            <i data-lucide="refresh-cw" style="width:10px"></i> RESYNC
                        </button>
                    </div>
                ` : ''}
            `;
            list.appendChild(div);
            lucide.createIcons();
        }
    </script>
</body>
</html>
