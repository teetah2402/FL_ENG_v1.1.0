<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <style>
    /* Kita pake Font bawaan sistem yang tebal biar aman */
    .brand-text {
      font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
      font-weight: 900;
      letter-spacing: 6px;
      font-size: 60px;
      paint-order: stroke fill;
      text-transform: uppercase;
    }

    /* Animasi Sirkuit Bawah */
    .circuit-line {
      stroke-dasharray: 10 20;
      stroke-dashoffset: 100;
      animation: circuitFlow 3s linear infinite;
    }

    @keyframes circuitFlow {
      to { stroke-dashoffset: 0; }
    }

    /* Kedip Node */
    .tech-node {
      animation: blink 2s ease-in-out infinite alternate;
    }

    @keyframes blink {
      0% { opacity: 0.5; r: 2; fill: #00f5ff; }
      100% { opacity: 1; r: 4; fill: #fff; }
    }
  </style>

  <defs>
    <linearGradient id="text_grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bc13fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="glass_fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>

    <filter id="simple-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <text x="50%" y="65%" text-anchor="middle" class="brand-text"
        fill="url(#glass_fill)"
        stroke="url(#text_grad)"
        stroke-width="2.5"
        filter="url(#simple-glow)">
    FLOWORK
  </text>

  <g stroke="url(#text_grad)" stroke-width="2" stroke-linecap="round">
    <path d="M40 85 H 360" opacity="0.2" stroke-width="1" />

    <path class="circuit-line" d="M40 85 H 360" stroke-width="2.5" />

    <path d="M40 85 L 30 75" opacity="0.8" />
    <path d="M360 85 L 370 75" opacity="0.8" />
  </g>

  <circle cx="30" cy="75" r="3" class="tech-node" style="animation-delay: 0s;" />
  <circle cx="370" cy="75" r="3" class="tech-node" style="animation-delay: 1s;" />
  <circle cx="200" cy="85" r="3" class="tech-node" style="animation-delay: 0.5s;" />

</svg>