########################################################################
# WEBSITE https://flowork.cloud
# File NAME : C:\flowork-nano\docker-compose.yml total lines 99 
########################################################################

name: flowork

networks:
  flowork-net:
    driver: bridge

services:
  flowork_gateway:
    image: flowork/gateway:dev
    container_name: flowork_gateway
    build:
      context: ./flowork-gateway
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - FLASK_ENV=production   # [SECURE] Force production mode
      - DEV_MODE=false         # [SECURE] Strict timestamp validation
    entrypoint: ["/bin/bash", "-c", "dos2unix /app/entrypoint.sh && /app/entrypoint.sh && echo '[Flowork Entrypoint] Seeding default engine from .env to DB...' && python seed_dev_engine.py"]
    volumes:
      - ./flowork-gateway:/app
      - ./data:/app/data
      - ./healthchecks:/app/healthchecks
      - ./.env:/app/.env
    ports:
      - "${GW_PORT:-8000}:8000"
    networks:
      flowork-net:
        aliases:
          - gateway
    healthcheck:
      test: ["CMD-SHELL", "python /app/healthchecks/health_gateway.py"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  flowork_core:
    image: flowork/core:lite
    container_name: flowork_core
    build:
      context: ./flowork-core
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - FLOWORK_ENV=production

      - NVIDIA_VISIBLE_DEVICES=void
      - CUDA_VISIBLE_DEVICES=""
      - ENABLE_GPU=false

    volumes:
      - .:/master_workspace
      - ./flowork-core:/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env
      - ./apps:/app/flowork_kernel/apps
      - ./assets:/app/flowork_kernel/assets
      - "${USERPROFILE}/Videos:/mnt/videos"

    ports:
      - "${CORE_PORT_TCP:-8989}:8989"   # Main API Port
      - "${CORE_PORT_HTTP:-8990}:8990"   # Extra HTTP Port
      - "${CORE_PORT_SOCKET:-5001}:5001" # WebSocket/SocketIO Port
    networks:
      - flowork-net
    depends_on:
      flowork_gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stdin_open: true
    tty: true

  flowork_cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: flowork_cloudflared
    restart: unless-stopped
    networks:
      - flowork-net
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    depends_on:
      flowork_gateway:
        condition: service_healthy
